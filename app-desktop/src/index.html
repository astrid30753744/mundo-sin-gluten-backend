<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mundo Sin Gluten</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<style>
:root{--green:#6B7A2F;--green-dark:#3D4A18;--green-ghost:rgba(107,122,47,0.05);--green-pale:#EEF2DB;--orange:#E8791D;--orange-dark:#B85E12;--orange-light:#F5A623;--orange-pale:#FFF3E5;--orange-ghost:rgba(232,121,29,0.05);--bg:#F5F6FA;--card:#fff;--card-warm:#FDFCFA;--header-dark:#1A2E0A;--text:#1C1C1E;--text-sec:#5A5A5E;--text-muted:#9E9EA3;--border:#ECECF0;--red:#E53935;--red-pale:#FFF0EF;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;--R:24px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.side{width:250px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.side-logo{padding:22px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14}
.side-logo img{width:44px;height:44px;border-radius:12px}
.side-logo .b{font-size:16px;font-weight:800;color:var(--green-dark)}
.side-logo .s{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:4}
.nav-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;border:none;background:none;text-align:left;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text-sec);cursor:pointer;transition:all .15s;position:relative}
.nav-btn:hover{background:var(--green-ghost)}
.nav-btn.active{background:var(--green-ghost);color:var(--green)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:2px;background:var(--orange)}
.nav-btn svg{width:18px;height:18px;stroke-width:2}
.nav-btn .badge{margin-left:auto;font-size:9px;padding:3px 8px;border-radius:8px;background:var(--orange-pale);color:var(--orange);font-weight:700}
.foot{padding:14px;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-muted)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:14}
.topbar img{width:30px;height:30px;border-radius:8px}
.topbar .t{flex:1;font-size:14px;font-weight:700;color:var(--green)}
.content{flex:1;overflow-y:auto;padding:26px 24px 60px}

.card{background:var(--card);border-radius:var(--R);border:1px solid var(--border);padding:22px;margin-bottom:18px;box-shadow:0 4px 16px rgba(0,0,0,0.04)}
.h1{font-size:22px;font-weight:800;color:var(--green-dark)}
.sub{font-size:13px;color:var(--text-sec);margin-top:4px;margin-bottom:24px}
.btn{padding:15px 26px;border-radius:16px;border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:10px}
.btn-o{background:var(--orange);color:#fff;box-shadow:0 6px 14px rgba(232,121,29,0.25)}
.btn-o:hover{background:var(--orange-dark)}
.btn-g{background:var(--green);color:#fff;box-shadow:0 6px 14px rgba(107,122,47,0.2)}
.btn-s{background:var(--card);border:1px solid var(--border);color:var(--text-sec)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.input{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--border);background:var(--card-warm);color:var(--text);font-family:var(--font);font-size:14px;outline:none}
.input:focus{border-color:var(--green)}
.input-m{font-family:var(--mono);color:var(--green);font-weight:600}

.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
.stat{padding:20px;border-radius:20px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.04)}
.stat-n{font-size:30px;font-weight:800;font-family:var(--mono)}
.stat-l{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

.dropzone{border:2.5px dashed var(--orange);border-radius:var(--R);padding:50px;text-align:center;cursor:pointer;background:var(--orange-ghost);transition:all .2s}
.dropzone:hover{background:var(--orange-pale)}

.tabs{display:flex;gap:6px;margin-bottom:22px}
.tab{padding:11px 22px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text-sec);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}
.tab.active{background:var(--orange);color:#fff;border-color:var(--orange);box-shadow:0 4px 12px rgba(232,121,29,0.2)}

table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:13px;text-align:right;font-weight:700;color:var(--text-muted);font-size:11px;text-transform:uppercase;background:var(--card-warm);border-bottom:1px solid var(--border)}
th:first-child{text-align:left}
td{padding:13px;text-align:right;border-bottom:1px solid var(--border);font-family:var(--mono);color:var(--text-sec)}
td:first-child{text-align:left;font-family:var(--font);color:var(--text);font-weight:600}
.pb{font-size:16px;font-weight:800;color:var(--orange)}
.mg{font-weight:600;color:var(--green)}

.total-card{background:var(--header-dark);border-radius:var(--R);padding:28px;text-align:center;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.total-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1.5px}
.total-val{font-size:40px;font-weight:800;color:var(--orange-light);margin-top:4px;font-family:var(--mono)}
.total-count{font-size:13px;color:rgba(255,255,255,.55);margin-top:6px}

.p-item{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:20px;background:var(--card);border:1px solid var(--border);margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.03);transition:all .15s}
.p-item:hover{border-color:var(--green)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.ok-msg{padding:14px 18px;border-radius:14px;background:var(--green-ghost);color:var(--green);font-size:13px;margin-top:14px}
.err-msg{padding:14px 18px;border-radius:14px;background:var(--red-pale);color:var(--red);font-size:13px;margin-top:14px}

@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="side">
  <div class="side-logo"><img src="../assets/logo.jpg"><div><div class="b">Mundo Sin Gluten</div><div class="s">Sistema POS</div></div></div>
  <div class="nav" id="nav"></div>
  <div class="foot">v1.0 · $0/mes</div>
</div>
<div class="main">
  <div class="topbar"><img src="../assets/logo.jpg"><div class="t">Mundo Sin Gluten</div><div style="display:flex;align-items:center;gap:6"><div style="width:7px;height:7px;border-radius:50%;background:var(--green)"></div><span style="font-size:11px;color:var(--text-muted)">Online</span></div></div>
  <div class="content" id="C"></div>
</div>
<script>
const API="https://mundo-sin-gluten.onrender.com/api";
let mod="precios",cfg={},pTmp=[];
const NAV=[{id:"precios",l:"Escanear",i:"camera",ok:1},{id:"productos",l:"Productos",i:"package",ok:1},{id:"config",l:"Configuración",i:"sliders",ok:1},{id:"stock",l:"Stock",i:"tag",ok:0},{id:"scanner",l:"Pistola",i:"crosshair",ok:0},{id:"ventas",l:"Ventas",i:"shopping-cart",ok:0},{id:"recetas",l:"Recetas",i:"book-open",ok:0}];
const fmt=n=>'$'+Math.round(n).toLocaleString('es-AR');
const $=id=>document.getElementById(id);
const get=async p=>(await fetch(API+p)).json();
const post=async(p,d)=>(await fetch(API+p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})).json();

function nav(){$("nav").innerHTML=NAV.map(i=>`<button class="nav-btn ${i.id===mod?'active':''}" onclick="${i.ok?`go('${i.id}')`:''}" ${!i.ok?'disabled style="opacity:.4"':''}><i data-feather="${i.i}"></i><span style="flex:1">${i.l}</span>${!i.ok?'<span class="badge">PRONTO</span>':''}</button>`).join("");feather.replace();}
function go(id){mod=id;nav();render();}
function render(){const c=$("C");c.scrollTop=0;({precios:rP,productos:rProd,config:rCfg}[mod]||rPH)(c);}

function rP(c){
  c.innerHTML=`<h2 class="h1">Escanear lista de precios</h2><p class="sub">Subí una foto y la IA extrae productos y calcula precios</p>
    <div class="tabs"><button class="tab active" onclick="sTab(this,'f')">📸 Foto (IA)</button><button class="tab" onclick="sTab(this,'c')">📄 CSV</button><button class="tab" onclick="sTab(this,'m')">✏️ Manual</button></div><div id="pc"></div>`;
  rF();
}
function sTab(el,t){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');({f:rF,c:rC,m:rM})[t]();}
function rF(){$("pc").innerHTML=`<div class="dropzone" onclick="$('fi').click()" ondrop="hd(event)" ondragover="event.preventDefault()"><div style="font-size:48px;margin-bottom:14px">📷</div><p style="font-size:17px;font-weight:700">Arrastrá o hacé click</p><p style="font-size:13px;color:var(--text-muted);margin-top:6px">La IA lee productos y precios automáticamente</p><input type="file" id="fi" accept="image/*" style="display:none" onchange="hf(this.files[0])"></div><div id="pe"></div>`;}
function rC(){$("pc").innerHTML=`<div class="card"><p style="font-weight:600;margin-bottom:10px">Pegá la lista (Nombre;Precio):</p><textarea id="ct" class="input" rows="8" style="resize:vertical;font-family:var(--mono);font-size:13px" placeholder="Harina sin TACC;2500&#10;Fideos;1800"></textarea><button class="btn btn-o" style="margin-top:14px;width:100%" onclick="pC()">Procesar</button></div><div id="pe"></div>`;}
function rM(){$("pc").innerHTML=`<div class="card"><p style="font-weight:600;margin-bottom:12px">Cargá productos a mano:</p><div id="mr"></div><button class="btn btn-s" style="margin-top:8px" onclick="aR()">+ Agregar</button><button class="btn btn-o" style="margin-top:14px;width:100%" onclick="pM()">Calcular</button></div><div id="pe"></div>`;aR();aR();aR();}
function aR(){$("mr").insertAdjacentHTML("beforeend",'<div style="display:flex;gap:8px;margin-bottom:6px"><input class="input mn" placeholder="Nombre" style="flex:2"><input class="input mp input-m" type="number" placeholder="Precio" style="flex:1"></div>');}
function hd(e){e.preventDefault();hf(e.dataTransfer.files[0]);}
async function hf(f){
  if(!f||!f.type.startsWith('image/'))return;
  $("pc").innerHTML='<div class="card" style="text-align:center;padding:40px"><div class="spinner"></div><p id="lm" style="font-size:16px;font-weight:700;color:var(--orange)">Analizando...</p><p style="font-size:12px;color:var(--text-muted);margin-top:6px">No cierres</p></div>';
  const ms=["Analizando...","Detectando...","Leyendo precios...","Calculando..."];let i=0;const iv=setInterval(()=>{i=Math.min(i+1,ms.length-1);const e=$("lm");if(e)e.textContent=ms[i];},2500);
  const rd=new FileReader();rd.onload=async e=>{try{
    const r=await post("/procesar-imagen-base64",{imagen:e.target.result,mimeType:f.type});clearInterval(iv);
    if(!r.ok){$("pc").innerHTML=`<div class="err-msg">⚠️ ${r.error}</div><button class="btn btn-s" style="margin-top:10px" onclick="rF()">← Reintentar</button>`;return;}
    pTmp=r.productos.map((p,i)=>({...p,_id:i,on:true}));rE(r.metodo);
  }catch(er){clearInterval(iv);$("pc").innerHTML=`<div class="err-msg">⚠️ ${er.message}</div><button class="btn btn-s" style="margin-top:10px" onclick="rF()">← Reintentar</button>`;}};rd.readAsDataURL(f);
}
async function pC(){const t=$("ct").value.trim();if(!t){$("pe").innerHTML='<div class="err-msg">Pegá la lista</div>';return;}const r=await post("/procesar-csv",{texto:t});if(!r.ok){$("pe").innerHTML=`<div class="err-msg">⚠️ ${r.error}</div>`;return;}pTmp=r.productos.map((p,i)=>({...p,_id:i,on:true}));rE("CSV");}
function pM(){const ns=document.querySelectorAll(".mn"),ps=document.querySelectorAll(".mp");const raw=[];ns.forEach((n,i)=>{if(n.value&&ps[i].value)raw.push({nombre:n.value,precio:parseFloat(ps[i].value)});});if(!raw.length){$("pe").innerHTML='<div class="err-msg">Completá al menos uno</div>';return;}post("/procesar-manual",{productos:raw}).then(r=>{if(!r.ok){$("pe").innerHTML=`<div class="err-msg">⚠️ ${r.error}</div>`;return;}pTmp=r.productos.map((p,i)=>({...p,_id:i,on:true}));rE("Manual");});}

function rE(mt){
  const act=pTmp.filter(p=>p.on&&p.precio_lista>0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:700">${pTmp.length} productos · <span style="color:var(--orange)">${mt}</span></h3><button class="btn btn-s" style="padding:10px 16px;font-size:12px" onclick="rP($('C'))">← Volver</button></div>`;
  pTmp.forEach((p,i)=>{h+=`<div class="p-item" style="opacity:${p.on?1:.25}"><div style="width:26px;height:26px;border-radius:8px;border:2.5px solid ${p.on?'var(--green)':'var(--text-muted)'};background:${p.on?'var(--green)':'transparent'};cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0" onclick="pTmp[${i}].on=!pTmp[${i}].on;rE('${mt}')">${p.on?'✓':''}</div><div style="flex:1;min-width:0"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.nombre}</div></div><div style="display:flex;align-items:center;gap:4"><span style="font-size:12px;color:var(--text-muted)">$</span><input type="number" value="${p.precio_lista}" class="input input-m" style="width:100px;text-align:right;font-size:14px;padding:8px" onchange="pTmp[${i}].precio_lista=parseFloat(this.value)||0;rE('${mt}')"></div><div style="text-align:right;min-width:110px"><div style="font-size:17px;font-weight:800;color:var(--orange)">${fmt(p.precio_publico)}</div>${p.margen?`<div style="font-size:11px;font-weight:600;color:var(--green)">+${p.margen}%</div>`:''}</div></div>`;});
  h+=`<button class="btn btn-g" style="width:100%;margin-top:16px" onclick="rR('${mt}')" ${!act.length?'disabled':''}>Ver resultado (${act.length}) →</button>`;
  $("pc").innerHTML=h;
}

function rR(mt){
  const act=pTmp.filter(p=>p.on&&p.precio_lista>0);const total=act.reduce((s,p)=>s+p.precio_publico,0);
  let h=`<div class="total-card"><div class="total-label">TOTAL GENERAL</div><div class="total-val">${fmt(total)}</div><div class="total-count">${act.length} productos</div></div>`;
  h+=`<div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th style="text-align:left">Producto</th><th>Lista</th><th>Público</th><th>Margen</th></tr></thead><tbody>`;
  act.forEach(p=>{h+=`<tr><td>${p.nombre}</td><td>${fmt(p.precio_lista)}</td><td class="pb">${fmt(p.precio_publico)}</td><td class="mg">+${(p.margen||0).toFixed(1)}%</td></tr>`;});
  h+=`</tbody></table></div>`;
  h+=`<div class="card" style="font-size:12px;color:var(--text-muted)"><strong>⚠️</strong> Si un producto ya existe y bajó, se mantiene el precio anterior. <strong style="color:var(--orange)">Nunca baja.</strong></div>`;
  h+=`<div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-s" onclick="rE('${mt}')">← Editar</button><button class="btn btn-o" onclick="xCSV()">📥 CSV</button><button class="btn btn-g" onclick="alert('✅ ${act.length} producto(s) confirmado(s)\\nTotal: ${fmt(total)}');go('precios')">💾 Confirmar</button></div>`;
  $("pc").innerHTML=h;
}

function xCSV(){const act=pTmp.filter(p=>p.on&&p.precio_lista>0);const h="Producto;Lista;Publico;Margen\n";const r=act.map(p=>`"${p.nombre}";${p.precio_lista};${p.precio_publico};${(p.margen||0).toFixed(1)}`).join("\n");const b=new Blob([h+r],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="precios_msg.csv";a.click();}

async function rProd(c){c.innerHTML=`<h2 class="h1">Productos</h2><p class="sub">Base de datos (próximamente guardado permanente)</p><div style="text-align:center;padding:50px"><div style="font-size:48px;margin-bottom:14px">📭</div><p style="font-size:15px;font-weight:600;color:var(--text-sec)">Sin productos guardados</p></div>`;}

async function rCfg(c){
  try{const d=await get("/config");cfg=d.config||{};}catch(e){cfg={ganancia:30,iva:21,flete:0,merma:0,iibb:0,otros:0};}
  const fs=[{k:"ganancia",l:"Ganancia",d:"Tu margen"},{k:"iva",l:"IVA",d:"Impuesto"},{k:"flete",l:"Flete",d:"Transporte"},{k:"merma",l:"Merma",d:"Pérdidas"},{k:"iibb",l:"IIBB",d:"Ing. Brutos"},{k:"otros",l:"Otros",d:"Extras"}];
  const mult=fs.reduce((m,f)=>m*(1+(parseFloat(cfg[f.k])||0)/100),1);
  let h=`<h2 class="h1">Configuración</h2><p class="sub">Costos, impuestos y ganancia</p><div class="grid g3">`;
  fs.forEach(f=>{h+=`<div class="card" style="margin:0"><div style="font-size:14px;font-weight:700;margin-bottom:2px">${f.l}</div><div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">${f.d}</div><div style="display:flex;align-items:center;gap:6"><input type="number" id="c-${f.k}" value="${cfg[f.k]||0}" step="0.5" class="input input-m" style="font-size:18px" onchange="uC()"><span style="font-size:16px;font-weight:700;color:var(--text-muted)">%</span></div></div>`;});
  h+=`</div><div class="total-card" style="margin-top:20px"><div class="total-label">MULTIPLICADOR</div><div class="total-val" id="mult">x${mult.toFixed(3)}</div><div class="total-count" id="ej">$1.000 → ${fmt(1000*mult)}</div><div style="font-size:11px;color:var(--orange-light);margin-top:10px;font-style:italic">⚠️ Precios solo suben, nunca bajan</div></div><div id="cm"></div>`;
  c.innerHTML=h;
}
async function uC(){
  const ks=["ganancia","iva","flete","merma","iibb","otros"];const d={};ks.forEach(k=>{const e=$("c-"+k);if(e)d[k]=e.value;});
  const r=await post("/config",d);cfg={...cfg,...d};
  const mult=ks.reduce((m,k)=>m*(1+(parseFloat(d[k])||0)/100),1);
  const me=$("mult"),ej=$("ej");if(me)me.textContent="x"+mult.toFixed(3);if(ej)ej.textContent="$1.000 → "+fmt(1000*mult);
  if(r.ok){$("cm").innerHTML='<div class="ok-msg">✅ Guardado</div>';setTimeout(()=>{$("cm").innerHTML="";},3000);}
}

function rPH(c){c.innerHTML=`<div style="text-align:center;padding:60px"><div style="width:80px;height:80px;border-radius:var(--R);background:var(--orange-pale);display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:18px">🚧</div><h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Próximamente</h2><p style="color:var(--text-muted)">Este módulo está preparado en el servidor</p></div>`;}

async function init(){try{const d=await get("/config");cfg=d.config||{};}catch(e){}nav();render();}
init();
</script>
</body>
</html>
